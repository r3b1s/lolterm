add_newline = true
command_timeout = 200
format = "[$directory$git_branch$git_status]($style)$character"

[character]
error_symbol = "[x](bold #ee5396)"
success_symbol = "[>](bold #be95ff)"

[directory]
truncation_length = 2
truncation_symbol = ".../"
repo_root_style = "bold #ee5396"
repo_root_format = "[$repo_root]($repo_root_style)[$path]($style)[$read_only]($read_only_style) "

[git_branch]
format = "[$branch]($style) "
style = "italic #ff7eb6"

[git_status]
format     = '[$all_status]($style)'
style      = "#be95ff"
ahead      = "+${count} "
diverged   = "+-${ahead_count}/${behind_count} "
behind     = "-${count} "
conflicted = "x "
up_to_date = "✓ "
untracked  = "? "
modified   = "* "
stashed    = ""
staged     = ""
renamed    = ""
deleted    = ""
